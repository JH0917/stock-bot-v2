name: Build and Deploy Stock Bot v2

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKERHUB_USERNAME }}/stock-bot-v2:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/stock-bot-v2:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop stock-bot-v2 || true
            sudo docker rm stock-bot-v2 || true
            sudo docker image prune -f
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stock-bot-v2:latest
            sudo docker run -d -p 8002:8002 \
              -e TZ=Asia/Seoul \
              -e KIS_APP_KEY=${{ secrets.KIS_APP_KEY }} \
              -e KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }} \
              -e KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }} \
              -e KIS_IS_PAPER=${{ secrets.KIS_IS_PAPER }} \
              -v /home/ec2-user/stock-bot-v2-data:/app/data \
              --restart unless-stopped \
              --name stock-bot-v2 ${{ secrets.DOCKERHUB_USERNAME }}/stock-bot-v2:latest
